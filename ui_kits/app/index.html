<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>StockFlow — App UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Cairo', system-ui, sans-serif;
  background: #F7F8F7;
  display: flex;
  justify-content: center;
  padding: 40px 20px;
  min-height: 100vh;
  direction: rtl;
}
#root { width: 100%; display: flex; justify-content: center; }
.kit-label {
  text-align: center;
  font-size: 11px;
  color: #737373;
  margin-bottom: 8px;
  font-family: 'Cairo', sans-serif;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components/AppBar.jsx"></script>
<script type="text/babel" src="components/StatCard.jsx"></script>
<script type="text/babel" src="components/StatusBadge.jsx"></script>
<script type="text/babel">
const { AppBar, StatCard, StatusBadge } = window;

const PHONE_STYLE = {
  width: 390,
  background: '#F7F8F7',
  borderRadius: 44,
  overflow: 'hidden',
  boxShadow: '0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06)',
};

const Notch = () => (
  <div style={{height:44,background:'#0A0A0A',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',color:'#fff',fontSize:12,fontWeight:600,fontFamily:"'Cairo',sans-serif",direction:'rtl'}}>
    <span style={{fontSize:14,fontWeight:700}}>٩:٤١</span>
    <div style={{display:'flex',gap:4,fontSize:11}}>📶 📶 🔋</div>
  </div>
);

const QuickActions = () => (
  <div style={{padding:'0 16px 16px'}}>
    <h3 style={{fontSize:14,fontWeight:600,color:'#0A0A0A',marginBottom:12,fontFamily:"'Cairo',sans-serif"}}>إجراءات سريعة</h3>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
      {[
        { icon: '🧾', label: 'فاتورة' },
        { icon: '📦', label: 'منتج' },
        { icon: '📊', label: 'تقرير' },
        { icon: '📋', label: 'Excel' },
      ].map(a => (
        <div key={a.label} style={{background:'#fff',borderRadius:16,padding:'12px 8px',textAlign:'center',boxShadow:'0 2px 8px rgba(15,81,50,0.06)',cursor:'default'}}>
          <div style={{fontSize:22,marginBottom:4}}>{a.icon}</div>
          <div style={{fontSize:11,color:'#737373',fontFamily:"'Cairo',sans-serif"}}>{a.label}</div>
        </div>
      ))}
    </div>
  </div>
);

const ActivityFeed = () => {
  const items = [
    { name: 'فاتورة #٢٣٤١', time: 'قبل ١٠ دقائق', amount: '٤,٢٠٠ ج.م', status: 'paid' },
    { name: 'فاتورة #٢٣٤٠', time: 'قبل ٣٠ دقيقة', amount: '٢,١٠٠ ج.م', status: 'partial' },
    { name: 'فاتورة #٢٣٣٩', time: 'قبل ١ ساعة', amount: '٨,٩٠٠ ج.م', status: 'debt' },
  ];
  const STATUS_LABELS = { paid: 'مدفوع', partial: 'جزئي', debt: 'آجل' };
  return (
    <div style={{padding:'0 16px 16px'}}>
      <h3 style={{fontSize:14,fontWeight:600,color:'#0A0A0A',marginBottom:12,fontFamily:"'Cairo',sans-serif"}}>آخر النشاطات</h3>
      <div style={{background:'#fff',borderRadius:24,padding:16,boxShadow:'0 2px 8px rgba(15,81,50,0.06)'}}>
        {items.map((item, i) => (
          <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i < items.length - 1 ? '1px solid #F0F0F0' : 'none'}}>
            <div>
              <div style={{fontSize:13,fontWeight:500,fontFamily:"'Cairo',sans-serif"}}>{item.name}</div>
              <div style={{fontSize:11,color:'#737373',fontFamily:"'Cairo',sans-serif"}}>{item.time}</div>
            </div>
            <div style={{textAlign:'left'}}>
              <div style={{fontSize:14,fontWeight:700,color:item.status === 'paid' ? '#0F5132' : item.status === 'partial' ? '#F97316' : '#B91C1C',fontFamily:"'Cairo',sans-serif"}}>{item.amount}</div>
              <StatusBadge status={item.status} label={STATUS_LABELS[item.status]} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

const BottomNav = () => {
  const items = ['الرئيسية', 'المنتجات', 'العملاء', 'فاتورة', 'الإعدادات'];
  const icons = ['🏠', '📦', '👥', '🧾', '⚙️'];
  return (
    <div style={{background:'#fff',borderTop:'1px solid #E5E5E5',display:'flex',justifyContent:'space-around',padding:'6px 0 12px',direction:'rtl'}}>
      {items.map((label, i) => (
        <div key={label} style={{textAlign:'center',cursor:'default'}}>
          <div style={{fontSize:20,color:i === 0 ? '#0F5132' : '#737373'}}>{icons[i]}</div>
          <div style={{fontSize:10,marginTop:2,color:i === 0 ? '#0F5132' : '#737373',fontFamily:"'Cairo',sans-serif"}}>{label}</div>
        </div>
      ))}
    </div>
  );
};

const App = () => (
  <div>
    <div className="kit-label">StockFlow App — Dashboard</div>
    <div style={PHONE_STYLE}>
      <Notch />
      <AppBar title="StockFlow" />
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,padding:16}}>
        <StatCard value="١٢,٤٥٠" currency="ج.م" label="تحصيلات اليوم" change="+١٢٪" changeType="up" />
        <StatCard value="١٢٤" label="عدد المنتجات" />
        <StatCard value="٣٤,٢٠٠" currency="ج.م" label="إجمالي الديون" change="-٥٪" changeType="down" />
        <StatCard value="٥٦" label="عدد العملاء" change="+٣" changeType="up" />
      </div>
      <QuickActions />
      <ActivityFeed />
      <BottomNav />
    </div>
    <div className="kit-label" style={{marginTop:12}}>الرئيسية | المنتجات | العملاء | الفواتير | الإعدادات</div>
  </div>
);

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
