<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F5132"/>
      <stop offset="100%" stop-color="#0a3d26"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- App icon background (adaptive icon shape) -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Shelf / warehouse rack — 3 horizontal shelves -->
  <rect x="96" y="140" width="320" height="20" rx="8" fill="rgba(255,255,255,0.15)"/>
  <rect x="96" y="240" width="320" height="20" rx="8" fill="rgba(255,255,255,0.15)"/>
  <rect x="96" y="340" width="320" height="20" rx="8" fill="rgba(255,255,255,0.15)"/>

  <!-- Side uprights -->
  <rect x="96" y="120" width="16" height="260" rx="6" fill="rgba(255,255,255,0.12)"/>
  <rect x="400" y="120" width="16" height="260" rx="6" fill="rgba(255,255,255,0.12)"/>

  <!-- Items on shelves -->
  <rect x="140" y="162" width="64" height="64" rx="10" fill="rgba(255,255,255,0.92)"/>
  <rect x="228" y="162" width="48" height="64" rx="10" fill="rgba(255,255,255,0.7)"/>
  <rect x="300" y="162" width="56" height="64" rx="10" fill="rgba(255,255,255,0.85)"/>

  <rect x="140" y="262" width="56" height="64" rx="10" fill="rgba(255,255,255,0.85)"/>
  <rect x="220" y="262" width="64" height="64" rx="10" fill="rgba(255,255,255,0.92)"/>
  <rect x="308" y="262" width="48" height="64" rx="10" fill="rgba(255,255,255,0.7)"/>

  <rect x="140" y="362" width="48" height="64" rx="10" fill="rgba(255,255,255,0.7)"/>
  <rect x="212" y="362" width="64" height="64" rx="10" fill="rgba(255,255,255,0.92)"/>
  <rect x="300" y="362" width="56" height="64" rx="10" fill="rgba(255,255,255,0.85)"/>

  <!-- Flow arrow cutting through diagonally with glow -->
  <path d="M190 200 L310 310" stroke="url(#arrow)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M270 288 L310 310 L290 330" stroke="url(#arrow)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Light reflection on top -->
  <rect x="256" y="120" width="160" height="40" rx="20" fill="url(#bg)" opacity="0"/>
</svg>
